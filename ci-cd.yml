name: CI/CD — Gestão de Vínculo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────
# JOB 1 — Lint e testes (roda em todo PR/push)
# ─────────────────────────────────────────────
jobs:
  lint-and-test:
    name: Lint & Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vinculo_user
          POSTGRES_PASSWORD: vinculo_pass
          POSTGRES_DB: vinculo_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend (Python / FastAPI) ──────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências backend
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint backend (ruff + black)
        working-directory: ./backend
        run: |
          pip install ruff black
          ruff check .
          black --check .

      - name: Testes backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://vinculo_user:vinculo_pass@localhost:5432/vinculo_db_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-ci
          ENVIRONMENT: test
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=80 -v

      - name: Upload cobertura (backend)
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend

      # ── Frontend (Node / Next.js) ───────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências frontend
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend (ESLint + Prettier)
        working-directory: ./frontend
        run: |
          npm run lint
          npm run format:check

      - name: Testes frontend
        working-directory: ./frontend
        run: npm run test -- --coverage --passWithNoTests

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ─────────────────────────────────────────────
  # JOB 2 — Build e push da imagem Docker
  # (apenas em push na main ou develop)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy para Staging
  # (apenas push na main)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/gestao-vinculo
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
            echo "✅ Deploy concluído em $(date)"

      - name: Notificar equipe
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Deploy *gestão-vínculo* para staging: ${{ job.status }}\nCommit: ${{ github.sha }}\nPor: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
